<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAMAN STORE - Digital Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: #020617; color: #f8fafc; font-family: sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        .btn-blue { background: #2563eb; transition: 0.3s; }
        .btn-blue:hover { background: #1d4ed8; box-shadow: 0 0 15px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body class="min-h-screen">

    <div id="loader" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-[99]">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <nav class="p-4 glass sticky top-0 z-40 hidden" id="nav">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-500 italic">MAMAN<span class="text-white font-black">STORE</span></h1>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-[10px] text-slate-500 uppercase font-bold">Saldo</p>
                    <p id="userBalance" class="text-green-400 font-black text-sm">Rp 0</p>
                </div>
                <button onclick="logout()" class="text-red-500 hover:text-red-400 text-lg">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-5">
        
        <div id="auth-section" class="hidden mt-12">
            <div class="glass p-8 rounded-[2rem] shadow-2xl border-t-2 border-blue-600">
                <div class="text-center mb-8">
                    <h2 class="text-3xl font-black mb-2">MASUK / DAFTAR</h2>
                    <p class="text-slate-400 text-xs">Akun otomatis dibuat jika belum terdaftar.</p>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 ml-2 uppercase tracking-widest">Email</label>
                        <input type="email" id="email" class="w-full p-4 bg-slate-900 rounded-2xl outline-none border border-slate-800 focus:border-blue-600 transition">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-500 ml-2 uppercase tracking-widest">Password</label>
                        <input type="password" id="pass" class="w-full p-4 bg-slate-900 rounded-2xl outline-none border border-slate-800 focus:border-blue-600 transition">
                    </div>
                    
                    <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 flex items-center justify-between">
                        <div id="captchaBox" class="text-blue-500 font-mono font-black italic text-xl tracking-widest select-none"></div>
                        <input type="text" id="captchaInput" placeholder="KODE" class="w-20 bg-transparent border-b border-blue-900 text-center outline-none font-bold uppercase text-blue-400">
                    </div>

                    <button onclick="handleAuth()" class="btn-blue w-full py-4 rounded-2xl font-black text-white shadow-xl">GAS SEKARANG</button>
                </div>
            </div>
        </div>

        <div id="user-section" class="hidden space-y-6">
            <div class="glass p-6 rounded-[2rem]">
                <h3 class="font-black text-xs text-blue-500 mb-4 tracking-widest uppercase">Metode Top Up QRIS</h3>
                <div class="bg-white p-2 rounded-2xl mb-4 max-w-[200px] mx-auto">
                    <img src="https://files.catbox.moe/vx9780.jpg" class="w-full">
                </div>
                <div class="space-y-3">
                    <input type="number" id="topupAmount" placeholder="Nominal Saldo" class="w-full p-3.5 bg-slate-900 rounded-xl outline-none text-sm border border-slate-800">
                    <input type="text" id="senderName" placeholder="Nama Pengirim (Cth: Maman)" class="w-full p-3.5 bg-slate-900 rounded-xl outline-none text-sm border border-slate-800">
                    <button onclick="sendTopup()" class="w-full bg-green-600 py-3.5 rounded-xl font-black text-xs hover:bg-green-500 transition">KIRIM KONFIRMASI</button>
                </div>
            </div>

            <h2 class="text-lg font-black italic tracking-wider px-2">DAFTAR PRODUK</h2>
            <div id="productList" class="grid gap-3"></div>

            <button onclick="toggleChat()" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 rounded-2xl shadow-xl flex items-center justify-center text-xl z-50">
                <i class="fa-solid fa-headset"></i>
            </button>

            <div id="chatBox" class="fixed bottom-24 right-6 left-6 max-w-sm glass rounded-[2rem] hidden flex flex-col h-[400px] z-50 overflow-hidden shadow-2xl border border-white/10">
                <div class="p-4 bg-blue-600 font-bold flex justify-between items-center text-sm">
                    <span>Chat Hubungi Owner</span>
                    <button onclick="toggleChat()"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="chatMessages" class="flex-1 p-4 overflow-y-auto space-y-3 text-[11px]"></div>
                <div class="p-3 bg-slate-900 flex gap-2">
                    <input type="text" id="chatInput" class="flex-1 bg-slate-800 p-2.5 rounded-xl outline-none text-xs" placeholder="Ketik pesan...">
                    <button onclick="sendChat()" class="bg-blue-600 px-4 rounded-xl"><i class="fa-solid fa-paper-plane text-xs"></i></button>
                </div>
            </div>
        </div>

        <div id="admin-section" class="hidden space-y-6">
            <div class="bg-blue-600 p-4 rounded-2xl text-center font-black text-sm">OWNER PANEL: MAMAN</div>
            
            <div class="glass p-6 rounded-[2rem]">
                <h3 class="font-bold text-xs mb-4 text-blue-400">TAMBAH BARANG</h3>
                <div class="space-y-3">
                    <input type="text" id="pName" placeholder="Nama Produk" class="w-full p-3 bg-slate-900 rounded-xl text-xs outline-none">
                    <input type="number" id="pPrice" placeholder="Harga" class="w-full p-3 bg-slate-900 rounded-xl text-xs outline-none">
                    <input type="text" id="pLink" placeholder="Link Download/File" class="w-full p-3 bg-slate-900 rounded-xl text-xs outline-none">
                    <button onclick="addProduct()" class="w-full bg-blue-600 py-3 rounded-xl font-bold text-xs">PUBLIKASIKAN</button>
                </div>
            </div>

            <div class="glass p-6 rounded-[2rem]">
                <h3 class="font-bold text-xs mb-4 text-green-500 italic uppercase tracking-widest">Antrian Saldo</h3>
                <div id="topupList" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE MILIK MAMAN
        const firebaseConfig = {
            apiKey: "AIzaSyDAxf5XPBWygyF1KlHV3Jd21vIFxwuzaAg",
            authDomain: "toko-manan.firebaseapp.com",
            databaseURL: "https://toko-manan-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "toko-manan",
            storageBucket: "toko-manan.firebasestorage.app",
            messagingSenderId: "660878265832",
            appId: "1:660878265832:web:e290c031864de14445285d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const ownerEmail = "ilmancahyosyabani1@gmail.com"; 

        // --- CAPTCHA ---
        let currentCap = "";
        function genCap() {
            currentCap = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('captchaBox').innerText = currentCap;
        }
        genCap();

        // --- LOGIC GABUNGAN (LOGIN & REGISTER) ---
        function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const cin = document.getElementById('captchaInput').value;

            if(cin.toUpperCase() !== currentCap) {
                alert("CAPTCHA SALAH!");
                genCap();
                return;
            }

            if(!email || !pass) return alert("Isi email & pass!");

            // Coba Login dulu
            auth.signInWithEmailAndPassword(email, pass).catch((error) => {
                // Kalau gagal (akun blm ada), otomatis Register
                if (error.code === 'auth/user-not-found') {
                    auth.createUserWithEmailAndPassword(email, pass).then(u => {
                        db.ref('users/' + u.user.uid).set({ email, balance: 0 });
                        alert("Akun berhasil dibuat!");
                    }).catch(err => alert("Error: " + err.message));
                } else {
                    alert("Password Salah atau Error: " + error.message);
                }
            });
        }

        // --- OBSERVER ---
        auth.onAuthStateChanged(user => {
            document.getElementById('loader').classList.add('hidden');
            if (user) {
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('nav').classList.remove('hidden');
                if(user.email === ownerEmail) {
                    document.getElementById('admin-section').classList.remove('hidden');
                    document.getElementById('user-section').classList.add('hidden');
                    loadTopups();
                } else {
                    document.getElementById('user-section').classList.remove('hidden');
                    document.getElementById('admin-section').classList.add('hidden');
                }
                loadProducts();
                loadBalance(user.uid);
                loadChats(user.uid);
            } else {
                document.getElementById('auth-section').classList.remove('hidden');
                document.getElementById('nav').classList.add('hidden');
                document.getElementById('user-section').classList.add('hidden');
                document.getElementById('admin-section').classList.add('hidden');
            }
        });

        // --- FUNCTIONS ---
        function loadBalance(uid) {
            db.ref('users/' + uid + '/balance').on('value', s => {
                const b = s.val() || 0;
                document.getElementById('userBalance').innerText = "Rp " + b.toLocaleString();
            });
        }

        function addProduct() {
            const name = document.getElementById('pName').value;
            const price = parseInt(document.getElementById('pPrice').value);
            const link = document.getElementById('pLink').value;
            if(!name || !price) return;
            db.ref('products').push({ name, price, link });
            alert("Berhasil Tambah!");
        }

        function loadProducts() {
            db.ref('products').on('value', s => {
                let h = '';
                s.forEach(c => {
                    const p = c.val();
                    h += `<div class="glass p-5 rounded-3xl flex justify-between items-center">
                        <div><p class="font-bold text-sm">${p.name}</p><p class="text-green-400 text-xs font-black">Rp ${p.price.toLocaleString()}</p></div>
                        <button onclick="buy('${p.price}', '${p.link}')" class="bg-blue-600 px-5 py-2 rounded-xl font-bold text-[10px]">BELI</button>
                    </div>`;
                });
                document.getElementById('productList').innerHTML = h || '<p class="text-center text-slate-600 text-xs mt-10">Stok Kosong.</p>';
            });
        }

        function sendTopup() {
            const u = auth.currentUser;
            const amt = parseInt(document.getElementById('topupAmount').value);
            const nm = document.getElementById('senderName').value;
            if(!amt || !nm) return alert("Isi Nominal & Nama Pengirim!");
            db.ref('topup_requests').push({ uid: u.uid, email: u.email, amount: amt, name: nm, status: 'pending' });
            alert("Tunggu di-ACC Maman!");
        }

        function loadTopups() {
            db.ref('topup_requests').on('value', s => {
                let h = '';
                s.forEach(c => {
                    const r = c.val();
                    if(r.status === 'pending') {
                        h += `<div class="bg-slate-900 p-4 rounded-2xl flex justify-between items-center border border-slate-800">
                            <div class="text-[10px]">
                                <p class="font-black text-white text-xs">${r.name}</p>
                                <p class="text-blue-400">Rp ${r.amount.toLocaleString()}</p>
                            </div>
                            <button onclick="acc('${c.key}', '${r.uid}', ${r.amount})" class="bg-green-600 text-black px-4 py-1.5 rounded-lg font-black text-[10px]">ACC</button>
                        </div>`;
                    }
                });
                document.getElementById('topupList').innerHTML = h || '<p class="text-center text-slate-700 text-xs">Kosong.</p>';
            });
        }

        function acc(k, uid, a) {
            db.ref('users/' + uid + '/balance').transaction(c => (c || 0) + a);
            db.ref('topup_requests/' + k).update({ status: 'success' });
        }

        function buy(price, link) {
            const uid = auth.currentUser.uid;
            db.ref('users/' + uid + '/balance').once('value', s => {
                const b = s.val() || 0;
                if(b >= price) {
                    db.ref('users/' + uid + '/balance').set(b - price);
                    alert("SUKSES! COPY LINK: " + link);
                } else {
                    alert("SALDO KURANG!");
                }
            });
        }

        function toggleChat() { document.getElementById('chatBox').classList.toggle('hidden'); }
        function sendChat() {
            const t = document.getElementById('chatInput').value;
            if(!t) return;
            const u = auth.currentUser;
            // Jika admin, tanya UID target di alert (simpel buat single file)
            let target = u.uid;
            if(u.email === ownerEmail) {
                target = prompt("UID Target Chat (Lihat di Database):");
            }
            if(!target) return;
            db.ref('chats/' + target).push({ sender: u.email, text: t });
            document.getElementById('chatInput').value = '';
        }

        function loadChats(uid) {
            db.ref('chats/' + uid).on('value', s => {
                let h = '';
                s.forEach(c => {
                    const m = c.val();
                    const isMe = m.sender === auth.currentUser.email;
                    h += `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                        <div class="${isMe ? 'bg-blue-600' : 'bg-slate-800'} p-2.5 rounded-2xl max-w-[80%]">
                            <p class="leading-relaxed font-bold uppercase text-[8px] opacity-40 mb-1">${isMe ? 'Anda' : 'Owner'}</p>
                            <p>${m.text}</p>
                        </div>
                    </div>`;
                });
                const container = document.getElementById('chatMessages');
                container.innerHTML = h;
                container.scrollTop = container.scrollHeight;
            });
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
