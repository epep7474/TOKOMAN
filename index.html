<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAMAN STORE - Premium Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-blue { background: #2563eb; transition: 0.3s; }
        .btn-blue:hover { background: #1d4ed8; box-shadow: 0 0 15px rgba(37, 99, 235, 0.3); }
        .card-img { aspect-ratio: 16 / 9; object-fit: cover; width: 100%; border-radius: 1.5rem 1.5rem 0 0; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="loader" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-[100]">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-blue-500 font-black tracking-widest uppercase mt-4">Maman Store</p>
    </div>
    <nav class="p-4 glass sticky top-0 z-40 hidden" id="nav">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-500 italic uppercase">MAMAN STORE</h1>
            <div class="flex items-center gap-2">
                <button onclick="toggleTopup()" class="w-8 h-8 bg-blue-600/20 text-blue-400 rounded-lg flex items-center justify-center border border-blue-500/30"><i class="fa-solid fa-plus text-xs"></i></button>
                <div class="bg-slate-800/50 px-3 py-1 rounded-lg border border-slate-700"><p id="userBalance" class="text-green-400 font-black text-xs leading-none">Rp 0</p></div>
                <button onclick="logout()" class="text-red-500 ml-1"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
    </nav>
    <div class="max-w-md mx-auto p-5">
        <div id="login-section" class="hidden mt-10">
            <div class="glass p-8 rounded-[2.5rem] border-t-2 border-blue-600 shadow-2xl">
                <h2 class="text-2xl font-black text-center mb-6 uppercase text-blue-500 italic">Login Maman Store</h2>
                <div class="space-y-4">
                    <input type="email" id="login-email" placeholder="Email" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none">
                    <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none">
                    <button onclick="handleLogin()" class="btn-blue w-full py-4 rounded-2xl font-black uppercase shadow-lg">Gas Masuk</button>
                    <p class="text-center text-[10px] text-slate-500 font-bold uppercase mt-2">Belum ada akun? <button onclick="showAuth('register')" class="text-blue-500 underline">Daftar</button></p>
                </div>
            </div>
        </div>
        <div id="register-section" class="hidden mt-10">
            <div class="glass p-8 rounded-[2.5rem] border-t-2 border-green-600">
                <h2 class="text-2xl font-black text-center mb-6 uppercase text-green-500">Bikin Akun</h2>
                <div class="space-y-4">
                    <input type="email" id="reg-email" placeholder="Email Baru" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none">
                    <input type="password" id="reg-pass" placeholder="Password Baru" class="w-full p-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none">
                    <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 flex items-center justify-between">
                        <div id="captchaBox" class="text-blue-500 font-black tracking-widest text-xl italic"></div>
                        <input type="text" id="captchaInput" placeholder="KODE" class="w-20 bg-transparent text-center border-b border-blue-900 text-blue-400 outline-none font-bold uppercase">
                    </div>
                    <button onclick="handleRegister()" class="w-full bg-green-600 py-4 rounded-2xl font-black shadow-lg">Daftar</button>
                    <p class="text-center text-[10px] text-slate-500 uppercase mt-2">Ada akun? <button onclick="showAuth('login')" class="text-blue-500 underline">Login</button></p>
                </div>
            </div>
        </div>
        <div id="user-section" class="hidden space-y-6">
            <div id="inventory-area" class="hidden space-y-4">
                <h2 class="text-[10px] font-black italic tracking-widest uppercase text-green-400 px-2">Inventory Lu</h2>
                <div id="myPurchaseList" class="grid gap-3"></div>
            </div>
            <div class="space-y-4">
                <h2 class="text-[10px] font-black italic tracking-widest uppercase text-blue-500 px-2">Katalog Produk</h2>
                <div id="productList" class="grid gap-5"></div>
            </div>
        </div>
        <div id="topup-modal" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-6 text-center">
            <div class="glass w-full max-w-sm p-6 rounded-[2.5rem] border-t-4 border-blue-600 relative">
                <button onclick="toggleTopup()" class="absolute top-4 right-6 text-slate-500"><i class="fa-solid fa-xmark"></i></button>
                <h3 class="font-black text-xs text-blue-500 mb-2 uppercase">Scan QRIS</h3>
                <img src="https://files.catbox.moe/vx9780.jpg" class="w-40 mx-auto rounded-2xl mb-4 shadow-xl">
                <div class="space-y-3">
                    <input type="number" id="topupAmount" placeholder="Nominal Rp" class="w-full p-3 bg-slate-900 rounded-xl outline-none text-xs border border-slate-800">
                    <input type="text" id="senderName" placeholder="Nama Pengirim" class="w-full p-3 bg-slate-900 rounded-xl outline-none text-xs border border-slate-800">
                    <button onclick="sendTopup()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-xs">KIRIM KONFIRMASI</button>
                </div>
            </div>
        </div>
        <div id="admin-section" class="hidden space-y-6">
            <div class="bg-blue-600 p-4 rounded-2xl text-center font-black text-sm uppercase italic">Owner Panel Maman</div>
            <div class="glass p-6 rounded-[2rem]">
                <h3 class="font-bold text-[10px] mb-4 text-blue-400 uppercase">Tambah Script</h3>
                <div class="space-y-2">
                    <input type="text" id="pName" placeholder="Nama Barang" class="w-full p-3 bg-slate-900 rounded-xl text-xs outline-none">
                    <input type="number" id="pPrice" placeholder="Harga" class="w-full p-3 bg-slate-900 rounded-xl text-xs outline-none">
                    <input type="text" id="pImage" placeholder="Link Thumbnail" class="w-full p-3 bg-slate-900 rounded-xl text-xs outline-none">
                    <input type="text" id="pLink" placeholder="Link Download" class="w-full p-3 bg-slate-900 rounded-xl text-xs outline-none">
                    <button onclick="addProduct()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-xs uppercase">Posting</button>
                </div>
            </div>
            <div class="glass p-6 rounded-[2rem] border-l-4 border-yellow-500">
                <h3 class="font-bold text-[10px] mb-4 text-yellow-500 uppercase">Antrian Saldo</h3>
                <div id="topupList" class="space-y-3"></div>
            </div>
            <div class="glass p-6 rounded-[2rem] border-l-4 border-blue-500">
                <h3 class="font-bold text-[10px] mb-4 text-blue-500 uppercase">Chat Masuk</h3>
                <div id="adminChatList" class="space-y-2"></div>
            </div>
        </div>
    </div>
    <button id="chat-btn" onclick="toggleChat()" class="fixed bottom-6 right-6 w-14 h-14 bg-blue-600 rounded-2xl shadow-xl flex items-center justify-center text-xl z-50 hidden"><i class="fa-solid fa-headset text-white"></i></button>
    <div id="chatBox" class="fixed bottom-24 right-6 left-6 max-w-sm glass rounded-[2.5rem] hidden flex flex-col h-[450px] z-50 overflow-hidden shadow-2xl">
        <div class="p-4 bg-blue-600 flex justify-between items-center text-xs font-black uppercase">
            <span id="chatTitle">Admin Maman</span>
            <button onclick="toggleChat()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div id="chatMessages" class="flex-1 p-5 overflow-y-auto space-y-4 text-[11px]"></div>
        <div class="p-3 bg-slate-900 flex gap-2">
            <input type="text" id="chatInput" class="flex-1 bg-slate-800 p-3 rounded-xl outline-none text-xs border border-slate-700" placeholder="Ketik pesan...">
            <button onclick="sendChat()" class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-paper-plane text-xs"></i></button>
        </div>
    </div>
        <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDAxf5XPBWygyF1KlHV3Jd21vIFxwuzaAg",
            authDomain: "toko-manan.firebaseapp.com",
            databaseURL: "https://toko-manan-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "toko-manan",
            storageBucket: "toko-manan.firebasestorage.app",
            messagingSenderId: "660878265832",
            appId: "1:660878265832:web:e290c031864de14445285d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const ownerEmail = "ilmancahyosyabani1@gmail.com"; 

        let selectedUserChat = null;

        function showAuth(mode) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('register-section').classList.add('hidden');
            document.getElementById(mode + '-section').classList.remove('hidden');
            if(mode === 'register') genCap();
        }

        let currentCap = "";
        function genCap() {
            currentCap = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('captchaBox').innerText = currentCap;
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Gagal Login!"));
        }

        function handleRegister() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const cin = document.getElementById('captchaInput').value;
            if(cin.toUpperCase() !== currentCap) { alert("Captcha Salah!"); genCap(); return; }
            auth.createUserWithEmailAndPassword(email, pass).then(u => {
                db.ref('users/' + u.user.uid).set({ email, balance: 0 });
            }).catch(err => alert("Gagal Daftar!"));
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('loader').classList.add('hidden');
            if (user) {
                document.getElementById('nav').classList.remove('hidden');
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('register-section').classList.add('hidden');
                if(user.email === ownerEmail) {
                    document.getElementById('admin-section').classList.remove('hidden');
                    document.getElementById('user-section').classList.add('hidden');
                    loadTopupRequests();
                    loadAdminChatList();
                } else {
                    document.getElementById('user-section').classList.remove('hidden');
                    document.getElementById('admin-section').classList.add('hidden');
                    loadUserPurchases(user.uid);
                }
                loadProducts();
                loadBalance(user.uid);
            } else {
                showAuth('login');
                document.getElementById('nav').classList.add('hidden');
            }
        });

        function loadBalance(uid) {
            db.ref('users/' + uid + '/balance').on('value', s => {
                const b = s.val() || 0;
                document.getElementById('userBalance').innerText = "Rp " + b.toLocaleString();
            });
        }

        function toggleTopup() { document.getElementById('topup-modal').classList.toggle('hidden'); }
        function toggleChat() { document.getElementById('chatBox').classList.toggle('hidden'); }

        function sendTopup() {
            const u = auth.currentUser;
            const amt = parseInt(document.getElementById('topupAmount').value);
            const nm = document.getElementById('senderName').value;
            if(!amt || !nm) return alert("Lengkapi data!");
            db.ref('topup_requests').push({ uid: u.uid, email: u.email, amount: amt, name: nm, status: 'pending' });
            alert("Sent! Tunggu Maman cek mutasi.");
            toggleTopup();
        }

        function loadTopupRequests() {
            db.ref('topup_requests').on('value', s => {
                let h = '';
                s.forEach(c => {
                    const r = c.val();
                    h += `<div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 space-y-2">
                        <div class="text-[10px]"><p class="font-black text-white text-xs uppercase">${r.name}</p><p class="text-blue-400 font-bold">Rp ${r.amount.toLocaleString()}</p></div>
                        <div class="flex gap-2 text-[9px] font-black">
                            <button onclick="accTopup('${c.key}', '${r.uid}', ${r.amount})" class="flex-1 bg-green-600 text-black py-2 rounded-lg">TERIMA</button>
                            <button onclick="rejectTopup('${c.key}')" class="flex-1 bg-red-600 text-white py-2 rounded-lg">TOLAK</button>
                        </div>
                    </div>`;
                });
                document.getElementById('topupList').innerHTML = h || 'Antrian Kosong.';
            });
        }

        function accTopup(k, uid, a) {
            db.ref('users/' + uid + '/balance').transaction(c => (c || 0) + a);
            db.ref('topup_requests/' + k).remove();
        }

        function rejectTopup(k) { db.ref('topup_requests/' + k).remove(); }

        function loadProducts() {
            db.ref('products').on('value', s => {
                let h = '';
                s.forEach(c => {
                    const p = c.val();
                    h += `<div class="glass overflow-hidden rounded-[2.2rem] flex flex-col border border-white/5 shadow-2xl">
                        <img src="${p.image}" class="card-img w-full">
                        <div class="p-5 flex justify-between items-center bg-slate-900/40">
                            <div><p class="font-black text-xs uppercase italic">${p.name}</p><p class="text-green-400 text-[10px] font-black leading-none mt-1">Rp ${p.price.toLocaleString()}</p></div>
                            <button onclick="buy('${p.price}', '${p.name}', '${p.link}', '${p.image}')" class="bg-blue-600 px-6 py-2 rounded-xl font-black text-[10px]">BELI</button>
                        </div>
                    </div>`;
                });
                document.getElementById('productList').innerHTML = h || 'Kosong.';
            });
        }

        function buy(price, name, link, image) {
            const u = auth.currentUser;
            db.ref('users/' + u.uid + '/balance').once('value', s => {
                const b = s.val() || 0;
                if(b >= price) {
                    db.ref('users/' + u.uid + '/balance').set(b - price);
                    db.ref('users/' + u.uid + '/purchases').push({ name, link, image });
                    alert("Sukses!");
                } else { alert("Saldo Kurang!"); }
            });
        }

        function loadUserPurchases(uid) {
            db.ref('users/' + uid + '/purchases').on('value', s => {
                let h = '';
                if(s.exists()) {
                    document.getElementById('inventory-area').classList.remove('hidden');
                    document.getElementById('chat-btn').classList.remove('hidden');
                    s.forEach(c => {
                        const p = c.val();
                        h += `<div class="glass p-3 rounded-2xl flex items-center gap-3 border border-green-500/20">
                            <img src="${p.image}" class="w-10 h-10 rounded-xl object-cover">
                            <div class="flex-1 text-[10px] font-black uppercase italic">
                                <p class="mb-1">${p.name}</p>
                                <a href="${p.link}" target="_blank" class="text-blue-400 underline">Download</a>
                            </div>
                        </div>`;
                    });
                }
                document.getElementById('myPurchaseList').innerHTML = h;
            });
        }

        function loadAdminChatList() {
            db.ref('chats').on('value', s => {
                let h = '';
                s.forEach(c => {
                    h += `<button onclick="openAdminChat('${c.key}')" class="w-full bg-slate-900 p-4 rounded-2xl text-left border border-slate-800 text-xs font-bold uppercase flex justify-between items-center italic">
                        <span>User: ${c.key.substring(0,8)}</span><i class="fa-solid fa-chevron-right text-blue-500"></i>
                    </button>`;
                });
                document.getElementById('adminChatList').innerHTML = h || 'Belum ada chat.';
            });
        }

        function openAdminChat(uid) {
            selectedUserChat = uid;
            document.getElementById('chatBox').classList.remove('hidden');
            loadMessages(uid);
        }

        function loadMessages(uid) {
            db.ref('chats/' + uid).on('value', s => {
                let h = '';
                s.forEach(c => {
                    const m = c.val();
                    const isMe = m.sender === auth.currentUser.email;
                    h += `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}"><div class="${isMe ? 'bg-blue-600' : 'bg-slate-800'} p-3 rounded-2xl max-w-[85%] text-[11px]"><p class="text-[7px] font-black mb-1 opacity-50 uppercase italic">${isMe ? 'Lu' : 'Owner'}</p><p>${m.text}</p></div></div>`;
                });
                const container = document.getElementById('chatMessages');
                container.innerHTML = h;
                container.scrollTop = container.scrollHeight;
            });
        }

        function sendChat() {
            const t = document.getElementById('chatInput').value;
            if(!t) return;
            const u = auth.currentUser;
            let target = (u.email === ownerEmail) ? selectedUserChat : u.uid;
            db.ref('chats/' + target).push({ sender: u.email, text: t });
            document.getElementById('chatInput').value = '';
        }

        function addProduct() {
            const n = document.getElementById('pName').value;
            const p = parseInt(document.getElementById('pPrice').value);
            const i = document.getElementById('pImage').value;
            const l = document.getElementById('pLink').value;
            db.ref('products').push({ name: n, price: p, image: i, link: l });
            alert("Ok!");
        }

        function logout() { auth.signOut(); }
    </script>
</body>
</html>
