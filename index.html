<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAMAN STORE - Premium Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background: #020617; color: #f1f5f9; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-blue { background: #2563eb; transition: 0.3s; }
        .card-img { aspect-ratio: 1/1; object-fit: cover; width: 100%; border-radius: 1rem; }
        .nav-active { color: #3b82f6; border-top: 2px solid #3b82f6; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body class="min-h-screen pb-24">
    <div id="loader" class="fixed inset-0 bg-slate-950 flex flex-col items-center justify-center z-[100]">
        <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <nav class="p-4 glass sticky top-0 z-40 hidden" id="nav">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-black text-blue-500 italic uppercase">MAMAN STORE</h1>
            <div class="flex items-center gap-3">
                <div class="bg-slate-800/50 px-3 py-1 rounded-lg border border-slate-700">
                    <p id="userBalance" class="text-green-400 font-black text-[10px] leading-none text-center">Rp 0</p>
                </div>
                <button onclick="logout()" class="text-red-500 text-sm"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>
    </nav>

    <div class="max-w-md mx-auto p-4">
        <div id="login-section" class="hidden mt-10">
            <div class="glass p-8 rounded-[2.5rem] border-t-2 border-blue-600 shadow-2xl">
                <h2 class="text-xl font-black text-center mb-6 uppercase text-blue-500 italic">Login</h2>
                <input type="email" id="login-email" placeholder="Email" class="w-full p-4 mb-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none text-sm">
                <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 mb-6 bg-slate-900 rounded-2xl border border-slate-800 outline-none text-sm">
                <button onclick="handleLogin()" class="btn-blue w-full py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Masuk</button>
                <p class="text-center text-[10px] text-slate-500 font-bold mt-4 uppercase">Belum ada akun? <button onclick="showAuth('register')" class="text-blue-500 underline">Daftar</button></p>
            </div>
        </div>

        <div id="register-section" class="hidden mt-10">
            <div class="glass p-8 rounded-[2.5rem] border-t-2 border-green-600">
                <h2 class="text-xl font-black text-center mb-6 uppercase text-green-500">Daftar</h2>
                <input type="email" id="reg-email" placeholder="Email Baru" class="w-full p-4 mb-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none text-sm">
                <input type="password" id="reg-pass" placeholder="Password Baru" class="w-full p-4 mb-4 bg-slate-900 rounded-2xl border border-slate-800 outline-none text-sm">
                <div class="bg-slate-950 p-4 rounded-2xl border border-slate-800 flex items-center justify-between mb-6">
                    <div id="captchaBox" class="text-blue-500 font-black tracking-widest text-lg italic"></div>
                    <input type="text" id="captchaInput" placeholder="KODE" class="w-16 bg-transparent text-center border-b border-blue-900 text-blue-400 outline-none font-bold uppercase text-xs">
                </div>
                <button onclick="handleRegister()" class="w-full bg-green-600 py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Buat Akun</button>
                <p class="text-center text-[10px] text-slate-500 mt-4 uppercase font-bold">Ada akun? <button onclick="showAuth('login')" class="text-blue-500 underline">Login</button></p>
            </div>
        </div>

        <div id="user-section" class="hidden">
            <div id="page-store" class="space-y-4">
                <div id="productList" class="grid grid-cols-2 gap-3 mt-2">
                    </div>
            </div>

            <div id="page-history" class="hidden space-y-4">
                <h2 class="text-[10px] font-black italic tracking-widest uppercase text-green-400 px-2">History Pembelian</h2>
                <div id="myPurchaseList" class="grid gap-3"></div>
            </div>

            <div id="page-profile" class="hidden space-y-6">
                <div class="glass p-6 rounded-[2rem] text-center">
                    <h3 class="font-black text-[10px] text-blue-500 mb-4 uppercase italic">Scan Untuk Top Up</h3>
                    <img src="https://files.catbox.moe/vx9780.jpg" class="w-40 mx-auto rounded-2xl mb-4 shadow-xl border border-white/5">
                    <div class="space-y-3">
                        <input type="number" id="topupAmount" placeholder="Nominal Rp" class="w-full p-3 bg-slate-900 rounded-xl outline-none text-xs border border-slate-800">
                        <input type="text" id="senderName" placeholder="Nama Pengirim" class="w-full p-3 bg-slate-900 rounded-xl outline-none text-xs border border-slate-800">
                        <button onclick="sendTopup()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-[10px] uppercase">Kirim Laporan</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass h-16 flex justify-around items-center px-4 z-50 hidden border-t border-white/5">
            <button onclick="switchPage('store')" id="nav-store" class="flex flex-col items-center gap-1 text-slate-500 py-2 px-4 transition-all">
                <i class="fa-solid fa-shop text-lg"></i>
                <span class="text-[8px] font-bold uppercase">Toko</span>
            </button>
            <button onclick="switchPage('history')" id="nav-history" class="flex flex-col items-center gap-1 text-slate-500 py-2 px-4 transition-all">
                <i class="fa-solid fa-clock-rotate-left text-lg"></i>
                <span class="text-[8px] font-bold uppercase">Transaksi</span>
            </button>
            <button onclick="switchPage('profile')" id="nav-profile" class="flex flex-col items-center gap-1 text-slate-500 py-2 px-4 transition-all">
                <i class="fa-solid fa-wallet text-lg"></i>
                <span class="text-[8px] font-bold uppercase">Top Up</span>
            </button>
        </div>

        <div id="admin-section" class="hidden space-y-6">
            <div class="bg-blue-600 p-3 rounded-xl text-center font-black text-xs uppercase tracking-widest italic shadow-lg">Admin Panel Maman</div>
            <div class="glass p-5 rounded-[2rem]">
                <h3 class="font-bold text-[10px] mb-4 text-blue-400 uppercase">Input Barang</h3>
                <div class="space-y-2 text-xs">
                    <input type="text" id="pName" placeholder="Nama Barang" class="w-full p-3 bg-slate-900 rounded-xl outline-none">
                    <input type="number" id="pPrice" placeholder="Harga" class="w-full p-3 bg-slate-900 rounded-xl outline-none">
                    <input type="text" id="pImage" placeholder="Link Gambar" class="w-full p-3 bg-slate-900 rounded-xl outline-none">
                    <input type="text" id="pLink" placeholder="Link File Download" class="w-full p-3 bg-slate-900 rounded-xl outline-none">
                    <button onclick="addProduct()" class="w-full bg-blue-600 py-3 rounded-xl font-black text-xs uppercase">Posting</button>
                </div>
            </div>
            <div class="glass p-5 rounded-[2rem] border-l-4 border-red-500">
                <h3 class="font-bold text-[10px] mb-4 text-red-500 uppercase">Hapus Barang</h3>
                <div id="adminProductList" class="space-y-2"></div>
            </div>
            <div class="glass p-5 rounded-[2rem] border-l-4 border-yellow-500">
                <h3 class="font-bold text-[10px] mb-4 text-yellow-500 uppercase">Antrian ACC</h3>
                <div id="topupList" class="space-y-3"></div>
            </div>
            <div class="glass p-5 rounded-[2rem] border-l-4 border-blue-500">
                <h3 class="font-bold text-[10px] mb-4 text-blue-500 uppercase">Chat Masuk</h3>
                <div id="adminChatList" class="space-y-2 text-xs font-bold italic"></div>
            </div>
        </div>
    </div>

    <div id="chatBox" class="fixed bottom-24 right-6 left-6 max-w-sm glass rounded-[2rem] hidden flex flex-col h-[400px] z-50 overflow-hidden shadow-2xl border border-white/10">
        <div class="p-4 bg-blue-600 flex justify-between items-center text-[10px] font-black uppercase tracking-widest">
            <span id="chatTitle">Customer Service</span>
            <button onclick="toggleChat()"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <div id="chatMessages" class="flex-1 p-5 overflow-y-auto space-y-4 text-[11px]"></div>
        <div class="p-3 bg-slate-900 flex gap-2 border-t border-slate-800">
            <input type="text" id="chatInput" class="flex-1 bg-slate-800 p-3 rounded-xl outline-none text-xs border border-slate-700" placeholder="Ketik pesan...">
            <button onclick="sendChat()" class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white"><i class="fa-solid fa-paper-plane text-xs"></i></button>
        </div>
    </div>
        <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDAxf5XPBWygyF1KlHV3Jd21vIFxwuzaAg",
            authDomain: "toko-manan.firebaseapp.com",
            databaseURL: "https://toko-manan-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "toko-manan",
            storageBucket: "toko-manan.firebasestorage.app",
            messagingSenderId: "660878265832",
            appId: "1:660878265832:web:e290c031864de14445285d"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();
        const ownerEmail = "ilmancahyosyabani1@gmail.com"; 
        let selectedUserChat = null;

        function showAuth(mode) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('register-section').classList.add('hidden');
            document.getElementById(mode + '-section').classList.remove('hidden');
            if(mode === 'register') genCap();
        }

        let currentCap = "";
        function genCap() {
            currentCap = Math.random().toString(36).substring(2, 6).toUpperCase();
            document.getElementById('captchaBox').innerText = currentCap;
        }

        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            auth.signInWithEmailAndPassword(email, pass).catch(err => alert("Gagal Login!"));
        }

        function handleRegister() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const cin = document.getElementById('captchaInput').value;
            if(cin.toUpperCase() !== currentCap) { alert("Captcha Salah!"); genCap(); return; }
            auth.createUserWithEmailAndPassword(email, pass).then(u => {
                db.ref('users/' + u.user.uid).set({ email, balance: 0 });
            }).catch(err => alert("Gagal Daftar!"));
        }

        // --- SISTEM PINDAH HALAMAN (SWITCHER) ---
        function switchPage(page) {
            const pages = ['store', 'history', 'profile'];
            pages.forEach(p => {
                document.getElementById('page-' + p).classList.add('hidden');
                document.getElementById('nav-' + p).classList.remove('nav-active');
            });
            document.getElementById('page-' + page).classList.remove('hidden');
            document.getElementById('nav-' + page).classList.add('nav-active');
        }

        auth.onAuthStateChanged(user => {
            document.getElementById('loader').classList.add('hidden');
            if (user) {
                document.getElementById('nav').classList.remove('hidden');
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('register-section').classList.add('hidden');
                
                if(user.email === ownerEmail) {
                    document.getElementById('admin-section').classList.remove('hidden');
                    document.getElementById('user-section').classList.add('hidden');
                    document.getElementById('bottom-nav').classList.add('hidden');
                    loadTopupRequests();
                    loadAdminChatList();
                    loadAdminProductList();
                } else {
                    document.getElementById('user-section').classList.remove('hidden');
                    document.getElementById('bottom-nav').classList.remove('hidden');
                    document.getElementById('admin-section').classList.add('hidden');
                    switchPage('store'); // Default buka toko
                    loadUserPurchases(user.uid);
                }
                loadProducts();
                loadBalance(user.uid);
                loadChats(user.uid);
            } else {
                document.getElementById('nav').classList.add('hidden');
                document.getElementById('bottom-nav').classList.add('hidden');
                document.getElementById('user-section').classList.add('hidden');
                document.getElementById('admin-section').classList.add('hidden');
                document.getElementById('chatBox').classList.add('hidden');
                showAuth('login');
            }
        });

        function loadBalance(uid) {
            db.ref('users/' + uid + '/balance').on('value', s => {
                const b = s.val() || 0;
                document.getElementById('userBalance').innerText = "Rp " + b.toLocaleString();
            });
        }

        function toggleChat() { document.getElementById('chatBox').classList.toggle('hidden'); }

        function sendTopup() {
            const u = auth.currentUser;
            const amt = parseInt(document.getElementById('topupAmount').value);
            const nm = document.getElementById('senderName').value;
            if(!amt || !nm) return alert("Lengkapi data!");
            db.ref('topup_requests').push({ uid: u.uid, email: u.email, amount: amt, name: nm, status: 'pending' });
            alert("Terkirim! Tunggu Maman cek mutasi.");
            switchPage('store');
        }

        // --- PRODUK DUA KOLOM (GRID) ---
        function loadProducts() {
            db.ref('products').on('value', s => {
                let h = '';
                s.forEach(c => {
                    const p = c.val();
                    h += `<div class="glass overflow-hidden rounded-[1.5rem] flex flex-col border border-white/5 shadow-xl">
                        <div class="p-2 pb-0">
                            <img src="${p.image}" class="card-img shadow-sm">
                        </div>
                        <div class="p-3 text-center">
                            <p class="font-black text-[10px] uppercase truncate italic">${p.name}</p>
                            <p class="text-green-400 text-[10px] font-black mt-1 mb-3 leading-none">Rp ${p.price.toLocaleString()}</p>
                            <button onclick="buy('${p.price}', '${p.name}', '${p.link}', '${p.image}')" class="w-full bg-blue-600 py-2 rounded-xl font-black text-[9px] uppercase tracking-tighter">Beli</button>
                        </div>
                    </div>`;
                });
                document.getElementById('productList').innerHTML = h || 'Kosong.';
            });
        }

        function buy(price, name, link, image) {
            const u = auth.currentUser;
            db.ref('users/' + u.uid + '/balance').once('value', s => {
                const b = s.val() || 0;
                if(b >= price) {
                    db.ref('users/' + u.uid + '/balance').set(b - price);
                    db.ref('users/' + u.uid + '/purchases').push({ 
                        name, link, image, date: new Date().toLocaleString('id-ID') 
                    });
                    alert("Sukses! Cek menu Transaksi.");
                } else { alert("Saldo Kurang!"); }
            });
        }

        function loadUserPurchases(uid) {
            db.ref('users/' + uid + '/purchases').on('value', s => {
                let h = '';
                if(s.exists()) {
                    s.forEach(c => {
                        const p = c.val();
                        h += `<div class="glass p-3 rounded-2xl flex items-center gap-3 border border-green-500/20">
                            <img src="${p.image}" class="w-10 h-10 rounded-xl object-cover">
                            <div class="flex-1 text-[9px] font-black uppercase italic tracking-tighter">
                                <p class="text-white mb-0.5 leading-none">${p.name}</p>
                                <p class="text-slate-500 text-[7px] mb-2 font-normal">${p.date || 'Lama'}</p>
                                <div class="flex gap-2">
                                    <a href="${p.link}" target="_blank" class="text-blue-400 underline uppercase">Download</a>
                                    <button onclick="toggleChat()" class="text-green-500 underline uppercase ml-1">Chat CS</button>
                                </div>
                            </div>
                        </div>`;
                    });
                }
                document.getElementById('myPurchaseList').innerHTML = h || '<p class="text-center text-slate-600 text-[10px] py-10">Belum ada pembelian.</p>';
            });
        }

        // --- ADMIN HELPERS ---
        function loadAdminProductList() {
            db.ref('products').on('value', s => {
                let h = '';
                s.forEach(c => {
                    const p = c.val();
                    h += `<div class="bg-slate-900/60 p-2 rounded-xl flex justify-between items-center border border-slate-800">
                        <div class="text-[9px] flex items-center gap-2">
                            <img src="${p.image}" class="w-7 h-7 rounded-lg object-cover">
                            <span class="font-black uppercase truncate w-24">${p.name}</span>
                        </div>
                        <button onclick="deleteProduct('${c.key}')" class="w-7 h-7 bg-red-600/20 text-red-500 rounded-lg"><i class="fa-solid fa-trash-can text-[10px]"></i></button>
                    </div>`;
                });
                document.getElementById('adminProductList').innerHTML = h;
            });
        }

        function deleteProduct(key) { if(confirm("Hapus?")) db.ref('products/' + key).remove(); }
        function addProduct() {
            const n = document.getElementById('pName').value, p = parseInt(document.getElementById('pPrice').value), i = document.getElementById('pImage').value, l = document.getElementById('pLink').value;
            db.ref('products').push({ name: n, price: p, image: i, link: l });
            alert("Ok!");
        }
        function accTopup(k, uid, a) { db.ref('users/' + uid + '/balance').transaction(c => (c || 0) + a); db.ref('topup_requests/' + k).remove(); }
        function rejectTopup(k) { db.ref('topup_requests/' + k).remove(); }
        function loadTopupRequests() {
            db.ref('topup_requests').on('value', s => {
                let h = '';
                s.forEach(c => {
                    const r = c.val();
                    h += `<div class="bg-slate-900 p-3 rounded-xl border border-slate-800 space-y-2"><div class="text-[9px] font-black uppercase"><p>${r.name}</p><p class="text-blue-400">Rp ${r.amount.toLocaleString()}</p></div><div class="flex gap-2"><button onclick="accTopup('${c.key}', '${r.uid}', ${r.amount})" class="flex-1 bg-green-600 py-1.5 rounded-lg text-[10px] text-black">ACC</button><button onclick="rejectTopup('${c.key}')" class="flex-1 bg-red-600 py-1.5 rounded-lg text-[10px]">Tolak</button></div></div>`;
                });
                document.getElementById('topupList').innerHTML = h || 'Kosong.';
            });
        }
        function loadAdminChatList() {
            db.ref('chats').on('value', s => {
                let h = '';
                s.forEach(c => {
                    h += `<button onclick="openAdminChat('${c.key}')" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-800 text-left mb-2 flex justify-between items-center italic uppercase"><span>User: ${c.key.substring(0,8)}</span><i class="fa-solid fa-chevron-right"></i></button>`;
                });
                document.getElementById('adminChatList').innerHTML = h || 'Belum ada chat.';
            });
        }
        function openAdminChat(uid) { selectedUserChat = uid; document.getElementById('chatBox').classList.remove('hidden'); loadChats(uid); }
        function loadChats(uid) {
            db.ref('chats/' + uid).on('value', s => {
                let h = '';
                s.forEach(c => {
                    const m = c.val();
                    const isMe = m.sender === auth.currentUser.email;
                    h += `<div class="flex ${isMe ? 'justify-end' : 'justify-start'}"><div class="${isMe ? 'bg-blue-600' : 'bg-slate-800'} p-3 rounded-2xl max-w-[85%] text-[10px]"><p class="text-[6px] font-black opacity-50 uppercase mb-0.5">${isMe ? 'Lu' : 'Owner'}</p><p>${m.text}</p></div></div>`;
                });
                const container = document.getElementById('chatMessages');
                container.innerHTML = h; container.scrollTop = container.scrollHeight;
            });
        }
        function sendChat() {
            const t = document.getElementById('chatInput').value; if(!t) return;
            const u = auth.currentUser; let target = (u.email === ownerEmail) ? selectedUserChat : u.uid;
            db.ref('chats/' + target).push({ sender: u.email, text: t }); document.getElementById('chatInput').value = '';
        }
        function logout() { auth.signOut(); }
    </script>
</body>
</html>
